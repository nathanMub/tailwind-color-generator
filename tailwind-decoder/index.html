    <script>
      // Intercept and handle any assignments to window.fetch to prevent the "Cannot set property fetch of #<Window> which has only a getter" TypeError
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchValue = originalFetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return fetchValue;
            },
            set: function(val) {
              fetchValue = val;
            }
          });
        } catch (e) {
          console.warn("Unable to patch window.fetch:", e);
        }
      })();
    </script>
